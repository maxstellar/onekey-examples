<!DOCTYPE html>
<html>
    <head>
        <title>game one</title>
        <link rel="stylesheet" href="index.css">
        <style>
            html {
                background-color: #282828;
            }
        </style>
        <script>
            let state = 0;

            function checkHover(elementId) {
                element = document.getElementById(elementId);
                if (element.matches(":hover")) {
                    return true;
                } else {
                    return false;
                };
            };
            
            function handleKeyPress() {
                hback = checkHover("back");
                if (hback) {
                    window.location.href = "index.html"
                }
                if (state == 0) {
                    intro = document.getElementById("intro");
                    if (intro) {
                        state++
                        intro.classList.add('fade-out');
                        intro.addEventListener('transitionend', () => {
                            intro.remove();
                            // begin game
                            state = 1;
                            gameLoop();
                        }, { once: true });
                    };
                };
            };

            document.addEventListener('keydown', (event) => {
                if (event.key === 'o') {
                    handleKeyPress()
                }
            });
        </script>
    </head>
    <body>
        <p id="back" class="btn" style="position: absolute; top: 10px; left: 10px;">back</p>
        <div id="intro" class="intro">
            <div class="menu">
            <h1>red light green light on a budget</h1>
            <p>how to play: hold down o to go forward, let go when red light is called!<br><br>again i didn't optimize this at all... sorry 😭<br>enjoy! (o to dismiss)</p>
            </div>
        </div>
        <div class="everything_else">
            
        </div>
</html>
