<!DOCTYPE html>
<html>
    <head>
        <title>game two</title>
        <link rel="stylesheet" href="index.css">
        <style>
            html {
                background-color: #282828;
            }
        </style>
        <script>
            let state = 0;
            let oDown = false;
            let fromTop = 0.8;

            function checkHover(elementId) {
                element = document.getElementById(elementId);
                if (element.matches(":hover")) {
                    return true;
                } else {
                    return false;
                };
            };
            
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            
            async function gameLoop() {
                while (true) {
                    await sleep(10);
                    if (oDown && state == 1) {
                        fromTop -= 0.001;
                        document.getElementById("player").style.top = `${window.innerHeight * fromTop}px`;
                    };
                }
            }

            document.addEventListener('keydown', (event) => {
                if (event.key === 'o') {
                    oDown = true;
                    hback = checkHover("back");
                    if (hback) {
                        window.location.href = "index.html"
                    }
                    if (state == 0) {
                        intro = document.getElementById("intro");
                        if (intro) {
                            intro.classList.add('fade-out');
                            intro.addEventListener('transitionend', () => {
                                intro.remove();
                                // begin game
                                state = 1;
                            }, { once: true });
                        };
                    };
                };
            });

            document.addEventListener('keyup', (event) => {
                if (event.key === 'o') {
                    oDown = false;
                }
            });

            gameLoop();
        </script>
    </head>
    <body>
        <p id="back" class="btn" style="position: absolute; top: 10px; left: 10px; z-index: 11;">back</p>
        <div id="intro" class="intro">
            <div class="menu">
            <h1>red light green light on a budget</h1>
            <p>how to play: hold down o to go forward, let go when red light is called!<br><br>again i didn't optimize this at all... sorry 😭<br>enjoy! (o to dismiss)</p>
            </div>
        </div>
        <div class="everything_else">
            <div class="circle" id="player"></div>
        </div>
</html>
