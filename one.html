<!DOCTYPE html>
<html>
    <head>
        <title>game one</title>
        <link rel="stylesheet" href="index.css">
        <script>
            let state = 0;
            function checkHover(elementId) {
                element = document.getElementById(elementId);
                if (element.matches(":hover")) {
                    return true;
                } else {
                    return false;
                };
            };

            function handleKeyPress() {
                hback = checkHover("back");
                if (state == 0) {
                    intro = document.getElementById("intro");
                    if (intro) {
                        state++
                        intro.classList.add('fade-out');
                        intro.addEventListener('transitionend', () => {
                            intro.remove();
                            // begin game
                            state = 1;
                        }, { once: true });
                    };
                };
                if (hback) {
                    window.location.href = "index.html";
                }
            };

            document.addEventListener('keydown', (event) => {
                if (event.key === 'o') {
                    handleKeyPress();
                };
            });

            while (true) {
                // check for game start
                setTimeout(() => {
                    if (state == 1) {
                        // game has started
                    }
                }, 1000);
            }
        </script>
    </head>
    <body>
        <p id="back" class="btn" style="position: absolute; top: 10px; left: 10px; z-index: 11;">back</p>
        <p id="back" class="btn" style="position: absolute; top: 10px; right: 20px; z-index: 9;">0</p>
        <div id="intro">
            <div class="menu">
            <h1>whack-a-mole on a budget</h1>
            <p>sorry this is a little buggy since i did not optimize it at all.<br>enjoy! (o to dismiss)</p>
            </div>
        </div>
        <div class="everything_else">
            <div class="wam">
                <grid-row>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                </grid-row>
                <grid-row>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                </grid-row>
                <grid-row>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                <div class="wamslot">●</div>
                </grid-row>
            </div>
        </div>
    </body>
</html>
